<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webserv 42 | File Uploads</title>
    <link rel="stylesheet" href="/assets/css/main.css">
    <style>
        .upload-area {
            border: 2px dashed var(--border-color);
            padding: 3rem;
            text-align: center;
            border-radius: var(--radius);
            margin: 1.5rem 0;
            cursor: pointer;
            transition: var(--transition);
        }

        .upload-area:hover {
            border-color: var(--accent-color);
            background-color: rgba(88, 166, 255, 0.05);
        }
    </style>
</head>

<body>
    <nav class="sidebar">
        <div class="logo">Webserv</div>
        <ul class="nav-links">
            <li><a href="/">Dashboard</a></li>
            <li><a href="methods.html">HTTP Methods</a></li>
            <li><a href="post_uploads.html" class="active">File Uploads</a></li>
            <li><a href="demo.html">CGI Demo</a></li>
            <li><a href="manager.html">File Manager (DELETE)</a></li>
        </ul>
    </nav>
    <main class="content">
        <header>
            <h1>Standard POST Uploads</h1>
            <span class="status-badge online">/upload</span>
        </header>

        <section class="card" style="max-width: 600px;">
            <h3>📤 Upload a File</h3>
            <p style="color: var(--text-muted); font-size: 0.9em; margin-bottom: 1rem;">
                Select a file to test the internal C++98 chunked buffer uploading capabilities.
            </p>

            <form id="uploadForm" enctype="multipart/form-data">
                <div class="upload-area" id="dropzone">
                    <p>Click to select or drag and drop a file</p>
                    <input type="file" id="fileInput" name="file" required style="display:none">
                </div>
                <div id="fileInfo" style="margin-bottom: 1rem; color: var(--accent-color);"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Upload File</button>
            </form>
        </section>

        <h2>Upload Log</h2>
        <div class="terminal" id="uploadLog">Awaiting File...</div>
    </main>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const info = document.getElementById('fileInfo');

        dropzone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                info.innerText = `Selected: ${e.target.files[0].name} (${(e.target.files[0].size / 1024).toFixed(2)} KB)`;
            }
        });

        document.getElementById('uploadForm').addEventListener('submit', function (e) {
            e.preventDefault();
            if (!fileInput.files.length) return;

            const file = fileInput.files[0];
            const reader = new FileReader();

            console.log("Reading file in browser...");

            reader.onload = function (event) {
                const arrayBuffer = event.target.result;
                console.log(`Uploading ${file.name} to /upload/${file.name}...`);

                fetch(`/upload/${file.name}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/octet-stream' },
                    body: arrayBuffer
                })
                    .then(r => {
                        console.log(`HTTP ${r.status} ${r.statusText}`);
                        return r.text();
                    })
                    .then(text => console.log("Server response: " + text))
                    .catch(err => console.log("Upload failed: " + err));
            };

            reader.readAsArrayBuffer(file);
        });

        function log(msg) {
            const term = document.getElementById('uploadLog');
            if (term.innerText === "Awaiting File...") term.innerText = "";
            term.innerText += `\n> ${msg}\n`;
        }
    </script>
</body>

</html>
