# TODO: si index et route / pas la on fait quoi?? et si index pas /

server {
	root ./www/site1
	listen 37.59.120.163
	port 9001
	server_name server_site1
	error_page 404 ./www/site1/errors/404.html
	error_page 405 ./www/site1/errors/405.html
	max_body_size 50000
	index acceuil.html

	route / {
		root ./www/site1
		directory_listing on
		methods GET POST DELETE
	}

	route /redirect {
		root ./www/site1/acceuil.html
		redirect 301 https://www.google.com
		methods GET
	}

	route /api {
		root ./www/site1/api
		methods GET POST
	}

	route /upload {
		root ./www/site1/upload
		methods GET POST DELETE
		upload on
		upload_path ./www/site1/upload
	}

	route /hello { 
		root ./www/site1/cgi-bin/hello.php
		methods GET POST
		cgi on
		cgi_extension .php
	}

	route /list_files { 
		root ./www/site1/cgi-bin/list_files.php
		methods GET POST
		cgi on
		cgi_extension .php
	}

	route /login {
		root ./www/site1/cgi/login.html
		methods POST GET
	}

	route /get_logs {
		root ./www/site1/cgi-bin/get_logs.php
		methods GET POST
		cgi on
		cgi_extension .php
	}

	route /infinite { 
		root ./www/site1/cgi-bin/infinite.php
		methods GET POST
		cgi on
		cgi_extension .php
	}

	route /sysinfo {
		root ./www/site1/cgi-bin/sysinfo.py
		methods GET POST
		cgi on
		cgi_extension .py
	}

	route /list_env {
		root ./www/site1/cgi-bin/list_env.sh
		methods GET POST
		cgi on
		cgi_extension .sh
	}
}

