# config principale

server {
	listen 127.0.0.1  # adresse locale
	port 9001 #SDUverifier
	root ./www
	server_name localhost
#	error_page 024865486595646846546849865 toto //SDU probleme
	error_page 404 ./errors/404.html
	error_page 500 ./errors/500.html
	# Route CGI PHP
	route /php 
	{ 
		root ./www/site1/php
		methods GET POST DELETE GET
		directory_listing on 
		cgi on
		cgi_extension .php
		cgi_path /usr/bin/php-cgi
	}
	index index.html
	max_body_size 10000000 
	error_page 02 toto
#	error_page 500 ./errors/501.html // SDU probleme verifier doublons

}

server {
	listen 127.0.0.1  # adresse locale
	port 9001
	server_name admin
	root ./www
	route /php 
	{ 
		root ./www/site1/php
		methods GET POST DELETE GET
		directory_listing on 
	}
}